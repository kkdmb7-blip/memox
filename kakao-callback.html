<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 중...</title>
<style>
  body { background: #05020e; color: #ede6f8; font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .msg { text-align: center; }
  .msg p { font-size: 14px; color: #9b8fb0; margin-top: 12px; letter-spacing: 0.05em; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.2);
    border-top-color: #d4af37; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>로그인 처리 중...</p>
</div>
<script>
const WORKER = "https://fortuna.kkdmb7.workers.dev";
const SB_URL = "https://ymghmfkqctckxxysxkvy.supabase.co";
const SB_KEY = "sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x";

async function handleLogin() {
  const code = new URLSearchParams(window.location.search).get("code");
  if (!code) { location.href = "/memox/"; return; }

  try {
    // 1. Worker 통해 카카오 토큰 교환
    const tokenRes = await fetch(`${WORKER}/kakao-token`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, redirect_uri: "https://kkdmb7-blip.github.io/memox/kakao-callback.html" })
    });
    const tokenData = await tokenRes.json();
    console.log('카카오 토큰 응답:', tokenData);
    const access_token = tokenData.access_token;
    if (!access_token) {
      console.log('카카오 오류: access_token 없음', tokenData);
      throw new Error("토큰 없음");
    }

    // 2. 카카오 사용자 정보 가져오기
    const userRes = await fetch("https://kapi.kakao.com/v2/user/me", {
      method: "POST",
      headers: { Authorization: `Bearer ${access_token}` },
      body: new URLSearchParams({
        property_keys: JSON.stringify(["kakao_account.email", "kakao_account.profile"])
      })
    });
    const userData = await userRes.json();
    console.log('카카오 사용자 응답:', userData);
    const email = userData.kakao_account?.email || null;
    const user = {
      id: "kakao_" + String(userData.id),
      kakao_id: String(userData.id),
      nickname: userData.properties?.nickname || "포르투나 회원",
      email: email,
      provider: "kakao"
    };

    // 3. localStorage 저장
    localStorage.setItem("fortuna_kakao_user", JSON.stringify(user));

    // 4. Supabase chat_users upsert
    await fetch(`${SB_URL}/rest/v1/chat_users`, {
      method: "POST",
      headers: {
        "apikey": SB_KEY,
        "Authorization": `Bearer ${SB_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ id: user.id, name: user.nickname })
    }).catch(e => console.warn("chat_users upsert 실패 (무시):", e));

    // 5. 메인으로 이동
    location.href = "/memox/";

  } catch (e) {
    console.error(e);
    document.querySelector('.msg p').textContent = "로그인 실패. 다시 시도해주세요.";
    setTimeout(() => location.href = "/memox/", 2000);
  }
}

handleLogin();
</script>
</body>
</html>
