<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 중...</title>
<style>
  body { background: #05020e; color: #ede6f8; font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .msg { text-align: center; }
  .msg p { font-size: 14px; color: #9b8fb0; margin-top: 12px; letter-spacing: 0.05em; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.2);
    border-top-color: #d4af37; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>로그인 처리 중...</p>
</div>
<script>
const WORKER = "https://fortuna.kkdmb7.workers.dev";

async function handleLogin() {
  const code = new URLSearchParams(window.location.search).get("code");
  if (!code) { location.href = "/memox/"; return; }

  try {
    // 1. Worker 통해 카카오 토큰 교환
    const tokenRes = await fetch(`${WORKER}/kakao-token`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, redirect_uri: "https://kkdmb7-blip.github.io/memox/kakao-callback.html" })
    });
    const tokenData = await tokenRes.json();
    // [DEBUG] 토큰 교환 결과 로그 (원인 파악용, 확인 후 제거)
    console.log('[kakao-token] status:', tokenRes.status, 'data:', JSON.stringify(tokenData));
    const access_token = tokenData.access_token;
    if (!access_token) throw new Error("토큰 없음");

    // 2. 카카오 사용자 정보 가져오기
    const userRes = await fetch("https://kapi.kakao.com/v2/user/me", {
      method: "POST",
      headers: { Authorization: `Bearer ${access_token}` },
      body: new URLSearchParams({
        property_keys: JSON.stringify(["kakao_account.email", "kakao_account.profile"])
      })
    });
    const userData = await userRes.json();

    const email = userData.kakao_account?.email;
    const nickname = userData.kakao_account?.profile?.nickname || userData.properties?.nickname;

    if (!email) {
      alert('카카오 이메일 동의가 필요합니다.');
      location.href = "/memox/";
      return;
    }

    // 3. resolve-user로 프로필 조회/생성 (실패해도 로그인은 완료)
    try {
      const resolveRes = await fetch('https://fortuna-silk.vercel.app/api/resolve-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name: nickname })
      });
      const profile = await resolveRes.json();
      if (profile && !profile.error) {
        // 성공: 전체 데이터 저장
        localStorage.setItem('fortuna_kakao_user', JSON.stringify({
          id: profile.id, email, name: nickname, profile
        }));
        location.href = "/memox/";
        return;
      }
    } catch (e) {}

    // resolve-user 실패 시: 최소 정보만 저장 후 이동
    // index.html에서 백그라운드 재시도
    localStorage.setItem('fortuna_kakao_user', JSON.stringify({ email, name: nickname }));
    location.href = "/memox/";

  } catch (e) {
    console.error(e);
    document.querySelector('.msg p').textContent = "로그인 실패. 다시 시도해주세요.";
    setTimeout(() => location.href = "/memox/", 2000);
  }
}

handleLogin();
</script>
</body>
</html>
