<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMOX — AI 정리 메모</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --accent: #c8f565;
    --accent2: #7c5cfc;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --danger: #ff4444;
    --warn: #f5a623;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Gmarket Sans', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .header-meta {
    font-size: 12px;
    color: var(--text3);
  }

  /* MAIN LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    height: calc(100vh - 57px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .memo-count {
    background: var(--surface3);
    color: var(--text2);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .search-box {
    margin: 12px 16px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 13px;
  }

  .memo-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .memo-list::-webkit-scrollbar { width: 4px; }
  .memo-list::-webkit-scrollbar-track { background: transparent; }
  .memo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .memo-card {
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.15s;
    position: relative;
  }

  .memo-card:hover { background: var(--surface2); border-color: var(--border); }
  .memo-card.active { background: var(--surface2); border-color: var(--accent); }

  .memo-card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .memo-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .memo-card-preview {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .memo-card-date {
    font-size: 10px;
    color: var(--text3);
    margin-top: 6px;
  }

  .star-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    transition: color 0.2s;
    padding: 2px;
  }

  .star-btn.starred { color: var(--warn); }
  .star-btn:hover { color: var(--warn); }

  .empty-sidebar {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 13px;
    line-height: 2;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* INPUT AREA */
  .input-area {
    border-bottom: 1px solid var(--border);
    padding: 24px 28px;
    background: var(--surface);
  }

  .input-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .input-wrapper {
    position: relative;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.7;
    resize: none;
    outline: none;
    min-height: 100px;
    max-height: 200px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 245, 101, 0.08);
  }

  textarea::placeholder { color: var(--text3); }

  .input-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
  }

  .btn-primary:hover:not(:disabled) {
    background: #d4ff7a;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: var(--surface3);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--surface2);
    color: var(--text);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text3); }

  .char-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
  }

  /* DETAIL VIEW */
  .detail-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
  }

  .detail-area::-webkit-scrollbar { width: 4px; }
  .detail-area::-webkit-scrollbar-track { background: transparent; }
  .detail-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--text3);
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .welcome-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 20px;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .welcome-sub { font-size: 13px; line-height: 2; }

  /* PROCESSING STATE */
  .processing-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }

  .processing-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-text {
    color: var(--text2);
    font-size: 14px;
    text-align: center;
    line-height: 2;
  }

  .processing-step {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* MEMO DETAIL */
  .memo-detail-header {
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .memo-detail-meta { flex: 1; }

  .memo-tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(200, 245, 101, 0.1);
    border: 1px solid rgba(200, 245, 101, 0.25);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .memo-detail-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .memo-detail-date {
    font-size: 12px;
    color: var(--text3);
  }

  .memo-detail-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    font-size: 15px;
    transition: all 0.15s;
  }

  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .icon-btn.starred { color: var(--warn); border-color: rgba(245, 166, 35, 0.3); }

  /* CONTENT BLOCKS */
  .content-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .block-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .block-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .block-label.original { color: var(--text3); }
  .block-label.summary { color: var(--accent); }
  .block-label.merged { color: var(--accent2); }

  .block-content {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text2);
    white-space: pre-wrap;
  }

  .block-content.summary-text {
    color: var(--text);
    font-size: 15px;
  }

  /* KEY POINTS */
  .key-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .key-point-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  .key-point-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 8px;
    flex-shrink: 0;
  }

  /* MERGE NOTIFICATION */
  .merge-notice {
    background: rgba(124, 92, 252, 0.1);
    border: 1px solid rgba(124, 92, 252, 0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #a58af8;
    animation: fadeUp 0.3s ease;
  }

  /* SIMILAR MEMOS */
  .similar-section {
    margin-bottom: 16px;
  }

  .similar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .similar-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .similar-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }

  .similar-item:hover { border-color: var(--accent2); }

  .similar-item-text { color: var(--text2); }
  .similar-score {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 700;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 28px 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text2); }

  /* TEMP BOX */
  .temp-badge {
    background: rgba(245, 166, 35, 0.1);
    border: 1px solid rgba(245, 166, 35, 0.25);
    color: var(--warn);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }

  .toast {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .toast.success { border-color: rgba(200, 245, 101, 0.3); }
  .toast.info { border-color: rgba(124, 92, 252, 0.3); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* EMPTY LIST */
  .empty-list {
    padding: 32px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 2;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* API KEY INPUT */
  .api-key-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text3);
  }

  .api-key-bar input {
    flex: 1;
    max-width: 360px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }

  .api-key-bar input:focus { border-color: var(--accent); }

  .api-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
  }

  .api-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
  }

  .api-dot.connected { background: var(--accent); }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">MEMO<span>X</span></div>
  <div class="header-meta">AI 정리형 메모앱 · MVP</div>
</header>

<div class="api-key-bar">
  <span>🔑 Gemini API Key</span>
  <input type="password" id="apiKeyInput" placeholder="AIza..." />
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span id="apiStatus">미연결</span>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" id="tabAll" onclick="switchSidebarTab('all')">전체</div>
      <div class="sidebar-tab" id="tabStar" onclick="switchSidebarTab('star')">⭐ 즐겨찾기</div>
      <div class="sidebar-tab" id="tabTemp" onclick="switchSidebarTab('temp')">📥 임시</div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="메모 검색..." id="searchInput" oninput="renderSidebar()" />
    </div>
    <div class="memo-list" id="memoList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="mainContent" class="detail-area">
      <div class="welcome-state">
        <div class="welcome-icon">🧠</div>
        <div class="welcome-title">생각 나는 거 그냥 붙여넣어</div>
        <div class="welcome-sub">
          AI가 알아서 정리하고<br>
          기존 메모랑 비교해서<br>
          합칠지, 새로 만들지 판단해줘
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-label">💬 새 내용 입력</div>
      <div class="input-wrapper">
        <textarea id="memoInput" placeholder="여기에 뭐든 붙여넣어. 길어도 돼. 말이 섞여있어도 돼." oninput="updateCharCount()"></textarea>
      </div>
      <div class="input-actions">
        <button class="btn btn-primary" id="processBtn" onclick="processInput()">⚡ AI 정리하기</button>
        <button class="btn btn-ghost" onclick="saveDirect()">📥 임시보관함</button>
        <div class="char-count" id="charCount">0자</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ── SUPABASE CONFIG ────────────────────────────────────────────
const SUPABASE_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer !== undefined ? options.prefer : 'return=representation'
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.hint || `DB 오류 ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// DB → 앱 객체 변환
function fromDb(r) {
  return {
    id: r.id,
    title: r.title,
    category: r.category,
    summary: r.summary,
    keyPoints: r.key_points || [],
    original: r.original,
    isTemp: r.is_temp,
    starred: r.starred,
    mergedFrom: r.merged_from,
    createdAt: r.created_at,
    updatedAt: r.updated_at
  };
}

// 앱 객체 → DB 형식 변환
function toDb(m) {
  return {
    id: m.id,
    title: m.title,
    category: m.category,
    summary: m.summary,
    key_points: m.keyPoints || [],
    original: m.original,
    is_temp: m.isTemp,
    starred: m.starred,
    merged_from: m.mergedFrom || null,
    created_at: m.createdAt,
    updated_at: m.updatedAt
  };
}

// ── STATE ──────────────────────────────────────────────────────
let memos = [];
let currentMemoId = null;
let sidebarTab = 'all';
let isProcessing = false;

function getApiKey() {
  const inputKey = document.getElementById('apiKeyInput').value.trim();
  return inputKey || localStorage.getItem('memox_gemini_key') || '';
}

// ── DB OPERATIONS ──────────────────────────────────────────────
async function loadMemos() {
  try {
    const rows = await sbFetch('memos?order=updated_at.desc', { prefer: '' });
    memos = rows.map(fromDb);
    renderSidebar();
  } catch (e) {
    toast('메모 불러오기 실패: ' + e.message, 'error');
  }
}

async function saveMemo(memo) {
  await sbFetch('memos', {
    method: 'POST',
    prefer: 'return=representation',
    body: JSON.stringify(toDb(memo))
  });
}

async function updateMemo(memo) {
  await sbFetch(`memos?id=eq.${memo.id}`, {
    method: 'PATCH',
    prefer: 'return=representation',
    body: JSON.stringify(toDb(memo))
  });
}

async function deleteMemoDb(id) {
  await sbFetch(`memos?id=eq.${id}`, {
    method: 'DELETE',
    prefer: ''
  });
}

// ── RENDER ─────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('memoList');
  const query = document.getElementById('searchInput').value.toLowerCase();

  let filtered = memos.filter(m => {
    if (sidebarTab === 'star') return m.starred;
    if (sidebarTab === 'temp') return m.isTemp;
    return !m.isTemp;
  });

  if (query) {
    filtered = filtered.filter(m =>
      (m.title || '').toLowerCase().includes(query) ||
      (m.summary || '').toLowerCase().includes(query) ||
      (m.original || '').toLowerCase().includes(query)
    );
  }

  filtered.sort((a, b) => b.updatedAt - a.updatedAt);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-list">${query ? '검색 결과 없음' : sidebarTab === 'temp' ? '임시보관함 비어있음' : sidebarTab === 'star' ? '즐겨찾기 없음' : '메모 없음\n아래에 뭔가 입력해봐'}</div>`;
    return;
  }

  const count = document.querySelector('.memo-count');
  if (count) count.textContent = filtered.length;

  list.innerHTML = filtered.map(m => `
    <div class="memo-card ${m.id === currentMemoId ? 'active' : ''}" onclick="selectMemo('${m.id}')">
      <div class="memo-card-tag">
        ${m.category || '미분류'}
        ${m.isTemp ? '<span class="temp-badge">임시</span>' : ''}
      </div>
      <div class="memo-card-title">${m.title || '제목 없음'}</div>
      <div class="memo-card-preview">${m.summary || m.original || ''}</div>
      <div class="memo-card-date">${formatDate(m.updatedAt)}</div>
      <button class="star-btn ${m.starred ? 'starred' : ''}" onclick="event.stopPropagation(); toggleStar('${m.id}')">
        ${m.starred ? '⭐' : '☆'}
      </button>
    </div>
  `).join('');
}

function selectMemo(id) {
  currentMemoId = id;
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  renderSidebar();
  showMemoDetail(memo);
}

function showMemoDetail(memo) {
  const main = document.getElementById('mainContent');

  const keyPointsHtml = memo.keyPoints && memo.keyPoints.length > 0
    ? `<ul class="key-points">${memo.keyPoints.map(p => `
        <li class="key-point-item">
          <div class="key-point-bullet"></div>
          <span>${p}</span>
        </li>`).join('')}</ul>`
    : `<div class="block-content summary-text">${memo.summary || ''}</div>`;

  const mergeNotice = memo.mergedFrom
    ? `<div class="merge-notice">🔗 "${memo.mergedFrom}"에 병합된 내용이 추가됨</div>`
    : '';

  main.innerHTML = `
    <div class="memo-detail-header">
      <div class="memo-detail-meta">
        <div class="memo-tag-badge">📂 ${memo.category || '미분류'}</div>
        <div class="memo-detail-title">${memo.title || '제목 없음'}</div>
        <div class="memo-detail-date">${formatDate(memo.updatedAt)} · 업데이트됨</div>
      </div>
      <div class="memo-detail-actions">
        <button class="icon-btn ${memo.starred ? 'starred' : ''}" onclick="toggleStar('${memo.id}')" title="즐겨찾기">${memo.starred ? '⭐' : '☆'}</button>
        ${memo.isTemp ? `<button class="icon-btn" onclick="promoteTemp('${memo.id}')" title="메모로 저장">✅</button>` : ''}
        <button class="icon-btn danger" onclick="deleteMemo('${memo.id}')" title="삭제">🗑</button>
      </div>
    </div>

    ${mergeNotice}

    <div class="content-block">
      <div class="block-label summary"><div class="dot"></div>AI 정리본</div>
      ${keyPointsHtml}
    </div>

    <div class="content-block">
      <div class="block-label original"><div class="dot"></div>원문</div>
      <div class="block-content">${memo.original || ''}</div>
    </div>
  `;
}

// ── PROCESS ────────────────────────────────────────────────────
async function processInput() {
  const input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘', 'info');

  const apiKey = getApiKey();
  if (!apiKey) return toast('API 키 먼저 입력해줘', 'info');

  if (isProcessing) return;
  isProcessing = true;

  const processBtn = document.getElementById('processBtn');
  processBtn.disabled = true;

  showProcessing('🔍 내용 분석 중...');
  await delay(400);

  try {
    // 기존 메모 요약 (유사도 판단용)
    const existingMemosSummary = memos.filter(m => !m.isTemp).slice(0, 10).map(m =>
      `ID:${m.id} | 제목:${m.title} | 카테고리:${m.category} | 요약:${(m.summary || '').substring(0, 100)}`
    ).join('\n');

    const prompt = `당신은 메모 정리 AI입니다. 아래 입력된 메모를 분석하고 JSON으로만 응답하세요.

기존 메모 목록:
${existingMemosSummary || '(없음)'}

새 입력:
${input}

다음 JSON 형식으로만 응답 (다른 텍스트 없이):
{
  "title": "핵심 제목 (15자 이내)",
  "category": "카테고리명 (예: 아이디어, 계획, 인물, 프로젝트, 기타)",
  "summary": "AI 정리 요약 (핵심만, 3-5문장)",
  "keyPoints": ["핵심 포인트1", "핵심 포인트2", "핵심 포인트3"],
  "similarMemoId": "유사한 기존 메모 ID (없으면 null)",
  "similarMemoTitle": "유사한 기존 메모 제목 (없으면 null)",
  "decision": "new 또는 merge 또는 temp",
  "decisionReason": "판단 이유 (1문장)"
}`;

    showProcessing('🤖 AI 정리 중...');

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 1000 }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API 오류');
    }

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI 응답 파싱 실패');

    const result = JSON.parse(jsonMatch[0]);

    showProcessing('💾 저장 중...');
    await delay(300);

    // 결정에 따라 처리
    if (result.decision === 'merge' && result.similarMemoId) {
      const existing = memos.find(m => m.id === result.similarMemoId);
      if (existing) {
        showMergeDecision(input, result, existing);
        return;
      }
    }

    // 새 메모 or 임시
    const newMemo = {
      id: genId(),
      title: result.title,
      category: result.category,
      summary: result.summary,
      keyPoints: result.keyPoints,
      original: input,
      isTemp: result.decision === 'temp',
      starred: false,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };

    await saveMemo(newMemo);
    memos.unshift(newMemo);
    renderSidebar();
    selectMemo(newMemo.id);
    document.getElementById('memoInput').value = '';
    updateCharCount();

    const msg = result.decision === 'temp'
      ? `📥 임시보관함에 저장됨 — ${result.decisionReason}`
      : `✅ 새 메모 생성됨 — "${result.title}"`;
    toast(msg, 'success');

  } catch (e) {
    console.error(e);
    toast('오류: ' + e.message, 'error');
    showWelcome();
  } finally {
    isProcessing = false;
    processBtn.disabled = false;
  }
}

function showMergeDecision(input, result, existingMemo) {
  const main = document.getElementById('mainContent');
  const tempId = genId();

  main.innerHTML = `
    <div style="max-width:600px; margin:0 auto; animation: fadeUp 0.3s ease;">
      <div style="font-family:'Gmarket Sans',sans-serif; font-size:20px; margin-bottom:8px;">🔗 비슷한 메모 발견!</div>
      <div style="font-size:13px; color:var(--text3); margin-bottom:24px;">${result.decisionReason}</div>

      <div class="content-block" style="border-color:rgba(124,92,252,0.3); background:rgba(124,92,252,0.05)">
        <div class="block-label merged"><div class="dot"></div>기존 메모 — ${existingMemo.title}</div>
        <div class="block-content">${existingMemo.summary || existingMemo.original || ''}</div>
      </div>

      <div class="content-block">
        <div class="block-label summary"><div class="dot"></div>새로 추가되는 내용 (AI 정리)</div>
        <div class="block-content summary-text">${result.summary}</div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="doMerge('${existingMemo.id}', ${JSON.stringify(input).replace(/'/g, "\\'")}, ${JSON.stringify(result).replace(/'/g, "\\'")})">
          🔗 기존 메모에 합치기
        </button>
        <button class="btn btn-secondary" onclick="saveAsNew(${JSON.stringify(input).replace(/'/g, "\\'")}, ${JSON.stringify(result).replace(/'/g, "\\'")})">
          ✨ 새 메모로 저장
        </button>
        <button class="btn btn-ghost" onclick="saveTemp(${JSON.stringify(input).replace(/'/g, "\\'")}, ${JSON.stringify(result).replace(/'/g, "\\'")})">
          📥 일단 임시보관
        </button>
      </div>
    </div>
  `;

  isProcessing = false;
  document.getElementById('processBtn').disabled = false;
}

async function doMerge(existingId, rawInput, result) {
  const existing = memos.find(m => m.id === existingId);
  if (!existing) return;

  const apiKey = getApiKey();
  showProcessing('🔄 병합 중...');

  try {
    if (apiKey) {
      const mergePrompt = `기존 메모와 새 내용을 하나로 합쳐서 정리해줘. JSON으로만 응답.

기존 메모 요약:
${existing.summary}

새 내용:
${result.summary}

응답 형식:
{
  "summary": "합쳐진 요약 (핵심만, 5-7문장)",
  "keyPoints": ["통합된 핵심1", "통합된 핵심2", "통합된 핵심3", "통합된 핵심4"]
}`;

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: mergePrompt }] }],
            generationConfig: { maxOutputTokens: 800 }
          })
        }
      );

      if (res.ok) {
        const data = await res.json();
        const raw = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
        const match = raw.match(/\{[\s\S]*\}/);
        if (match) {
          const merged = JSON.parse(match[0]);
          existing.summary = merged.summary;
          existing.keyPoints = merged.keyPoints;
        }
      }
    }

    existing.original = (existing.original || '') + '\n\n---\n\n' + rawInput;
    existing.mergedFrom = existing.title;
    existing.updatedAt = Date.now();

    await updateMemo(existing);
    renderSidebar();
    selectMemo(existing.id);
    document.getElementById('memoInput').value = '';
    updateCharCount();
    toast(`✅ "${existing.title}"에 병합됨`, 'success');
  } catch (e) {
    toast('병합 오류: ' + e.message);
    showWelcome();
  }
}

async function saveAsNew(rawInput, result) {
  const memo = {
    id: genId(),
    title: result.title,
    category: result.category,
    summary: result.summary,
    keyPoints: result.keyPoints,
    original: rawInput,
    isTemp: false,
    starred: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  memos.unshift(memo);
  await saveMemo(memo);
  renderSidebar();
  selectMemo(memo.id);
  document.getElementById('memoInput').value = '';
  updateCharCount();
  toast(`✅ 새 메모로 저장됨 — "${memo.title}"`, 'success');
}

async function saveTemp(rawInput, result) {
  const memo = {
    id: genId(),
    title: result.title,
    category: result.category,
    summary: result.summary,
    keyPoints: result.keyPoints,
    original: rawInput,
    isTemp: true,
    starred: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  memos.unshift(memo);
  await saveMemo(memo);
  renderSidebar();
  selectMemo(memo.id);
  document.getElementById('memoInput').value = '';
  updateCharCount();
  toast('📥 임시보관함에 저장됨', 'info');
}

async function saveDirect() {
  const input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘', 'info');
  const memo = {
    id: genId(),
    title: input.substring(0, 20) + (input.length > 20 ? '...' : ''),
    category: '임시',
    summary: input,
    keyPoints: [],
    original: input,
    isTemp: true,
    starred: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  memos.unshift(memo);
  await saveMemo(memo);
  renderSidebar();
  selectMemo(memo.id);
  document.getElementById('memoInput').value = '';
  updateCharCount();
  toast('📥 임시보관함에 저장됨', 'info');
}

// ── ACTIONS ────────────────────────────────────────────────────
async function toggleStar(id) {
  const m = memos.find(m => m.id === id);
  if (!m) return;
  m.starred = !m.starred;
  m.updatedAt = Date.now();
  await updateMemo(m);
  renderSidebar();
  if (currentMemoId === id) selectMemo(id);
  toast(m.starred ? '⭐ 즐겨찾기 추가' : '☆ 즐겨찾기 해제', 'info');
}

async function deleteMemo(id) {
  if (!confirm('이 메모를 삭제할까요?')) return;
  await deleteMemoDb(id);
  memos = memos.filter(m => m.id !== id);
  currentMemoId = null;
  renderSidebar();
  showWelcome();
  toast('🗑 삭제됨', 'info');
}

async function promoteTemp(id) {
  const m = memos.find(m => m.id === id);
  if (!m) return;
  m.isTemp = false;
  m.updatedAt = Date.now();
  await updateMemo(m);
  renderSidebar();
  selectMemo(id);
  toast('✅ 정식 메모로 저장됨', 'success');
}

function switchSidebarTab(tab) {
  sidebarTab = tab;
  ['tabAll', 'tabStar', 'tabTemp'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(tab === 'all' ? 'tabAll' : tab === 'star' ? 'tabStar' : 'tabTemp').classList.add('active');
  renderSidebar();
}

// ── UI HELPERS ─────────────────────────────────────────────────
function showProcessing(text) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="processing-state">
      <div class="processing-spinner"></div>
      <div class="processing-text">
        <div class="processing-step">${text}</div>
        <div style="margin-top:8px; font-size:12px; color:var(--text3)">잠깐만...</div>
      </div>
    </div>
  `;
}

function showWelcome() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="welcome-state">
      <div class="welcome-icon">🧠</div>
      <div class="welcome-title">생각 나는 거 그냥 붙여넣어</div>
      <div class="welcome-sub">
        AI가 알아서 정리하고<br>
        기존 메모랑 비교해서<br>
        합칠지, 새로 만들지 판단해줘
      </div>
    </div>
  `;
}

function updateCharCount() {
  const len = document.getElementById('memoInput').value.length;
  document.getElementById('charCount').textContent = `${len.toLocaleString()}자`;
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── UTILS ──────────────────────────────────────────────────────
function genId() {
  return 'memo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '방금';
  if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// API Key
const savedKey = localStorage.getItem('memox_gemini_key');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
  document.getElementById('apiDot').classList.add('connected');
  document.getElementById('apiStatus').textContent = '연결됨';
}

document.getElementById('apiKeyInput').addEventListener('input', function() {
  const key = this.value.trim();
  const dot = document.getElementById('apiDot');
  const status = document.getElementById('apiStatus');
  if (key.length > 10) {
    dot.classList.add('connected');
    status.textContent = '연결됨';
    localStorage.setItem('memox_gemini_key', key);
  } else {
    dot.classList.remove('connected');
    status.textContent = key ? '키 확인 중' : '미연결';
    localStorage.removeItem('memox_gemini_key');
  }
});

// Ctrl+Enter to process
document.getElementById('memoInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') processInput();
});

// INIT — Supabase에서 메모 불러오기
loadMemos();
