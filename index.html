<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MEMOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --surface3:#222;
    --border:#2a2a2a; --accent:#c8f565; --accent2:#7c5cfc;
    --text:#f0f0f0; --text2:#888; --text3:#444;
    --danger:#ff4444; --warn:#f5a623;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* HEADER */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; border-bottom:1px solid var(--border);
    background:var(--bg); flex-shrink:0;
  }
  .logo { font-family:'Gmarket Sans',sans-serif; font-weight:700; font-size:19px; color:var(--accent); }
  .logo span { color:var(--text); }
  .header-right { display:flex; align-items:center; gap:8px; }
  .api-pill {
    display:flex; align-items:center; gap:5px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:5px 11px; cursor:pointer; font-size:11px; color:var(--text3);
  }
  .api-pill.connected { border-color:rgba(200,245,101,0.3); color:var(--accent); }
  .api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); }
  .api-dot.on { background:var(--accent); }
  .all-memos-btn {
    background:var(--surface2); color:var(--text2); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px; font-size:11px; font-weight:700;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .all-memos-btn:hover { background:var(--surface3); color:var(--text); }

  /* API KEY MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:500; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:24px; width:100%; max-width:400px;
  }
  .modal-title { font-family:'Gmarket Sans',sans-serif; font-size:18px; margin-bottom:6px; }
  .modal-sub { font-size:12px; color:var(--text3); margin-bottom:14px; line-height:1.8; }
  .modal input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px; color:var(--text); font-size:13px;
    font-family:monospace; outline:none; margin-bottom:12px;
  }
  .modal input:focus { border-color:var(--accent); }

  /* SCREENS */
  .screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
  .screen.active { display:flex; }

  /* HOME SCREEN */
  .home-top {
    display:grid; grid-template-columns:1fr 1fr;
    flex:1; overflow:hidden; border-bottom:1px solid var(--border);
  }
  .home-panel {
    display:flex; flex-direction:column; overflow:hidden;
    border-right:1px solid var(--border);
  }
  .home-panel:last-child { border-right:none; }
  .panel-header {
    padding:12px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .panel-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text3); }
  .panel-body { flex:1; overflow-y:auto; padding:10px; }
  .panel-body::-webkit-scrollbar { width:3px; }
  .panel-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* TODO */
  .todo-input-row { display:flex; gap:6px; margin-bottom:8px; }
  .todo-input-row input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:7px; padding:7px 10px; color:var(--text); font-size:12px;
    font-family:'Noto Sans KR',sans-serif; outline:none; min-width:0;
  }
  .todo-input-row input:focus { border-color:var(--accent); }
  .todo-add-btn {
    background:var(--accent); color:#0a0a0a; border:none; border-radius:7px;
    width:30px; height:30px; font-size:16px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  .todo-item {
    display:flex; align-items:center; gap:8px; padding:8px 6px; border-radius:7px;
    cursor:pointer; transition:background 0.15s; margin-bottom:3px;
  }
  .todo-item:hover { background:var(--surface2); }
  .todo-check {
    width:16px; height:16px; border-radius:50%; border:2px solid var(--border);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .todo-item.done .todo-check { background:var(--accent); border-color:var(--accent); }
  .todo-item.done .todo-check::after { content:'✓'; font-size:9px; color:#0a0a0a; font-weight:700; }
  .todo-text { flex:1; font-size:12px; color:var(--text2); line-height:1.4; }
  .todo-item.done .todo-text { text-decoration:line-through; color:var(--text3); }
  .todo-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:12px; padding:2px; opacity:0; transition:opacity 0.15s; }
  .todo-item:hover .todo-del { opacity:1; }
  .panel-empty { text-align:center; padding:24px 10px; color:var(--text3); font-size:11px; line-height:2; }

  /* MEMO ROWS */
  .memo-row {
    display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:8px;
    cursor:pointer; border:1px solid var(--border); margin-bottom:5px;
    background:var(--surface); transition:all 0.15s;
  }
  .memo-row:hover { border-color:var(--accent2); background:var(--surface2); }
  .memo-row-cat { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--accent); white-space:nowrap; min-width:36px; }
  .memo-row-title { flex:1; font-size:12px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .memo-row-date { font-size:10px; color:var(--text3); white-space:nowrap; }
  .memo-row-arrow { color:var(--text3); font-size:11px; }

  /* INPUT AREA (홈 하단) */
  .home-input {
    padding:14px 16px; background:var(--surface); flex-shrink:0;
  }
  textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text); font-size:13px;
    font-family:'Noto Sans KR',sans-serif; line-height:1.6; resize:none; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s; display:block;
  }
  textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,245,101,0.07); }
  textarea::placeholder { color:var(--text3); }
  .input-actions { display:flex; gap:8px; margin-top:10px; align-items:center; flex-wrap:wrap; }
  .char-count { font-size:11px; color:var(--text3); margin-left:auto; }

  /* LIST SCREEN */
  .screen-header {
    padding:13px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .back-btn { background:none; border:none; cursor:pointer; color:var(--text2); font-size:20px; padding:0; }
  .screen-title { font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; }
  .search-wrap { padding:10px 14px; border-bottom:1px solid var(--border); position:relative; flex-shrink:0; }
  .search-wrap input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px 7px 30px; color:var(--text); font-size:13px;
    font-family:'Noto Sans KR',sans-serif; outline:none;
  }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap .si { position:absolute; left:24px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text3); }
  .list-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .list-tab { flex:1; padding:9px; text-align:center; font-size:11px; font-weight:700; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
  .list-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .list-body { flex:1; overflow-y:auto; padding:10px 12px; }
  .list-body::-webkit-scrollbar { width:3px; }
  .list-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* DETAIL SCREEN */
  .detail-header {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .detail-header-meta { flex:1; min-width:0; }
  .detail-actions { display:flex; gap:6px; }
  .icon-btn {
    width:32px; height:32px; border-radius:7px; border:1px solid var(--border);
    background:var(--surface2); cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:var(--text2); font-size:14px; transition:all 0.15s;
  }
  .icon-btn:hover { background:var(--surface3); color:var(--text); }
  .icon-btn.starred { color:var(--warn); border-color:rgba(245,166,35,0.3); }
  .icon-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
  .detail-cat { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
  .detail-title { font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; line-height:1.3; }
  .detail-body { flex:1; overflow-y:auto; padding:16px; }
  .detail-body::-webkit-scrollbar { width:3px; }
  .detail-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* CONTENT BLOCKS */
  .content-block { background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:16px; margin-bottom:12px; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .block-label { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .block-label .dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .block-label.summary { color:var(--accent); }
  .key-points { list-style:none; display:flex; flex-direction:column; gap:7px; }
  .key-point-item { display:flex; align-items:flex-start; gap:9px; font-size:13px; color:var(--text); line-height:1.6; }
  .key-point-bullet { width:5px; height:5px; border-radius:50%; background:var(--accent); margin-top:8px; flex-shrink:0; }
  .original-content { font-size:13px; line-height:1.85; color:var(--text2); white-space:pre-wrap; }
  .show-original-btn {
    width:100%; padding:11px; background:var(--surface2); border:1px solid var(--border);
    border-radius:9px; color:var(--text3); font-size:12px; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; margin-bottom:12px; transition:all 0.15s;
  }
  .show-original-btn:hover { border-color:var(--text3); color:var(--text2); }
  .merge-notice { background:rgba(124,92,252,0.1); border:1px solid rgba(124,92,252,0.25); border-radius:9px; padding:10px 12px; margin-bottom:12px; font-size:12px; color:#a58af8; display:flex; align-items:center; gap:7px; }

  /* MERGE SCREEN */
  .merge-body { flex:1; overflow-y:auto; padding:16px; }

  /* PROCESSING */
  .processing-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:400; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
  .processing-overlay.open { display:flex; }
  .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .processing-step { font-size:12px; color:var(--accent); font-weight:700; letter-spacing:1px; }

  /* BUTTONS */
  .btn { padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:700; transition:all 0.15s; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#0a0a0a; }
  .btn-primary:hover:not(:disabled) { background:#d4ff7a; }
  .btn-secondary { background:var(--surface3); color:var(--text2); border:1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { color:var(--text); }
  .btn-ghost { background:transparent; color:var(--text3); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { color:var(--text); border-color:var(--text3); }

  /* TOAST */
  .toast-container { position:fixed; bottom:16px; right:16px; display:flex; flex-direction:column; gap:6px; z-index:999; }
  .toast { background:var(--surface3); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:9px; font-size:12px; animation:slideIn 0.3s ease; box-shadow:0 6px 20px rgba(0,0,0,0.4); }
  .toast.success { border-color:rgba(200,245,101,0.3); }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

  /* TEMP BADGE */
  .temp-badge { background:rgba(245,166,35,0.1); border:1px solid rgba(245,166,35,0.2); color:var(--warn); font-size:9px; font-weight:700; padding:1px 5px; border-radius:20px; }

  /* MOBILE */
  @media (max-width:600px) {
    .home-top { grid-template-columns:1fr; grid-template-rows:1fr 1fr; }
    .home-panel { border-right:none; border-bottom:1px solid var(--border); }
    .home-panel:last-child { border-bottom:none; }
    textarea { font-size:14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">MEMO<span>X</span></div>
  <div class="header-right">
    <div class="api-pill" id="apiPill" onclick="document.getElementById('apiModal').classList.add('open')">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiStatus">API 키 설정</span>
    </div>
    <button class="all-memos-btn" onclick="showScreen('list')">📋 전체 메모</button>
  </div>
</header>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <div class="modal-title">🔑 Gemini API 키</div>
    <div class="modal-sub">aistudio.google.com → Get API key → Create API key<br>무료로 발급 가능해!</div>
    <input type="password" id="apiKeyInput" placeholder="AIza..." oninput="onApiKeyInput(this.value)" />
    <button class="btn btn-primary" onclick="document.getElementById('apiModal').classList.remove('open')">확인</button>
  </div>
</div>

<!-- PROCESSING OVERLAY -->
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-step" id="processingStep">처리 중...</div>
</div>

<!-- SCREEN: HOME -->
<div class="screen active" id="screenHome">
  <!-- 상단: 할일 + 즐겨찾기 -->
  <div class="home-top">
    <div class="home-panel">
      <div class="panel-header">
        <div class="panel-title">📋 할일</div>
        <span style="font-size:10px;color:var(--text3)" id="todoCount"></span>
      </div>
      <div class="panel-body">
        <div class="todo-input-row">
          <input type="text" id="todoInput" placeholder="할일 추가..." onkeydown="if(event.key==='Enter')addTodo()" />
          <button class="todo-add-btn" onclick="addTodo()">+</button>
        </div>
        <div id="todoList"></div>
      </div>
    </div>
    <div class="home-panel">
      <div class="panel-header">
        <div class="panel-title">⭐ 즐겨찾기</div>
      </div>
      <div class="panel-body" id="starredList"></div>
    </div>
  </div>
  <!-- 하단: 입력창 -->
  <div class="home-input">
    <textarea id="memoInput" rows="3" placeholder="생각나는 거 그냥 붙여넣어. 길어도 돼." oninput="updateCharCount()"></textarea>
    <div class="input-actions">
      <button class="btn btn-primary" id="processBtn" onclick="processInput()">⚡ AI 정리하기</button>
      <button class="btn btn-ghost" onclick="saveDirect()">💾 바로저장</button>
      <div class="char-count" id="charCount">0자</div>
    </div>
  </div>
</div>

<!-- SCREEN: LIST -->
<div class="screen" id="screenList">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <div class="screen-title">📋 전체 메모</div>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" placeholder="검색..." id="searchInput" oninput="renderList()" />
  </div>
  <div class="list-tabs">
    <div class="list-tab active" id="ltabAll" onclick="switchListTab('all')">전체</div>
    <div class="list-tab" id="ltabStar" onclick="switchListTab('star')">⭐ 즐겨찾기</div>
    <div class="list-tab" id="ltabTemp" onclick="switchListTab('temp')">📥 임시</div>
  </div>
  <div class="list-body" id="memoListBody"></div>
</div>

<!-- SCREEN: DETAIL -->
<div class="screen" id="screenDetail">
  <div class="detail-header">
    <button class="back-btn" id="detailBackBtn" onclick="goBackFromDetail()">←</button>
    <div class="detail-header-meta">
      <div class="detail-cat" id="detailCat"></div>
      <div class="detail-title" id="detailTitle"></div>
    </div>
    <div class="detail-actions">
      <button class="icon-btn" id="starBtn" onclick="toggleStarCurrent()">☆</button>
      <button class="icon-btn danger" onclick="deleteCurrentMemo()">🗑</button>
    </div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- SCREEN: MERGE -->
<div class="screen" id="screenMerge">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <div class="screen-title">🔗 비슷한 메모 발견</div>
  </div>
  <div class="merge-body" id="mergeBody"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ── SUPABASE CONFIG ────────────────────────────────────────────
const SUPABASE_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer !== undefined ? options.prefer : 'return=representation'
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.hint || `DB 오류 ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function fromDb(r) {
  return {
    id: r.id, title: r.title, category: r.category, summary: r.summary,
    keyPoints: r.key_points || [], original: r.original,
    isTemp: r.is_temp, starred: r.starred, mergedFrom: r.merged_from,
    createdAt: r.created_at, updatedAt: r.updated_at
  };
}

function toDb(m) {
  return {
    id: m.id, title: m.title, category: m.category, summary: m.summary,
    key_points: m.keyPoints || [], original: m.original,
    is_temp: m.isTemp, starred: m.starred, merged_from: m.mergedFrom || null,
    created_at: m.createdAt, updated_at: m.updatedAt
  };
}

// ── STATE ──────────────────────────────────────────────────────
let memos = [];
let todos = JSON.parse(localStorage.getItem('memox_todos') || '[]');
let currentMemoId = null;
let listTab = 'all';
let prevScreen = 'home';
let isProcessing = false;

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem('memox_gemini_key') || '';
}

function onApiKeyInput(val) {
  const dot = document.getElementById('apiDot');
  const status = document.getElementById('apiStatus');
  const pill = document.getElementById('apiPill');
  if (val.length > 10) {
    dot.classList.add('on');
    status.textContent = '연결됨';
    pill.classList.add('connected');
    localStorage.setItem('memox_gemini_key', val);
  } else {
    dot.classList.remove('on');
    status.textContent = 'API 키 설정';
    pill.classList.remove('connected');
    localStorage.removeItem('memox_gemini_key');
  }
}

// ── DB OPERATIONS ──────────────────────────────────────────────
async function loadMemos() {
  try {
    const rows = await sbFetch('memos?order=updated_at.desc', { prefer: '' });
    memos = rows.map(fromDb);
    renderHome();
  } catch (e) {
    toast('메모 불러오기 실패: ' + e.message);
  }
}

async function saveMemo(memo, embedding = null) {
  const data = toDb(memo);
  if (embedding) data.embedding = JSON.stringify(embedding);
  await sbFetch('memos', { method: 'POST', prefer: 'return=representation', body: JSON.stringify(data) });
}

async function updateMemo(memo, embedding = null) {
  const data = toDb(memo);
  if (embedding) data.embedding = JSON.stringify(embedding);
  await sbFetch(`memos?id=eq.${memo.id}`, { method: 'PATCH', prefer: 'return=representation', body: JSON.stringify(data) });
}

async function deleteMemoDb(id) {
  await sbFetch(`memos?id=eq.${id}`, { method: 'DELETE', prefer: '' });
}

// ── EMBEDDING & VECTOR SEARCH ──────────────────────────────────
async function getEmbedding(text, apiKey) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'models/text-embedding-004', content: { parts: [{ text: text.substring(0, 2000) }] } })
    }
  );
  if (!res.ok) throw new Error('임베딩 오류: ' + res.status);
  const data = await res.json();
  return data.embedding?.values || null;
}

async function findSimilarMemos(embedding, threshold = 0.75) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/match_memos`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_embedding: embedding, match_threshold: threshold, match_count: 3 })
    });
    if (!res.ok) return [];
    return await res.json();
  } catch { return []; }
}

// ── SCREEN NAVIGATION ──────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'list') renderList();
}

function goBackFromDetail() {
  showScreen(prevScreen === 'list' ? 'list' : 'home');
}

// ── TODO ──────────────────────────────────────────────────────
function saveTodos() { localStorage.setItem('memox_todos', JSON.stringify(todos)); }

function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ id: genId(), text, done: false });
  input.value = '';
  saveTodos();
  renderTodos();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  saveTodos();
  renderTodos();
}

function renderTodos() {
  const list = document.getElementById('todoList');
  const count = document.getElementById('todoCount');
  const remaining = todos.filter(t => !t.done).length;
  if (count) count.textContent = remaining > 0 ? `${remaining}개 남음` : '';

  if (todos.length === 0) {
    list.innerHTML = '<div class="todo-empty">할일을 추가해봐 👆</div>';
    return;
  }
  list.innerHTML = todos.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}" onclick="toggleTodo('${t.id}')">
      <div class="todo-check"></div>
      <div class="todo-text">${escHtml(t.text)}</div>
      <button class="todo-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">✕</button>
    </div>
  `).join('');
}

// ── HOME RENDER ────────────────────────────────────────────────
function renderHome() {
  renderTodos();
  const starred = memos.filter(m => m.starred && !m.isTemp);
  const list = document.getElementById('starredList');
  if (!list) return;
  if (starred.length === 0) {
    list.innerHTML = '<div class="memo-empty">즐겨찾기한 메모가 없어<br>메모에서 ☆ 눌러봐</div>';
    return;
  }
  list.innerHTML = starred.map(m => memoRowHtml(m, 'home')).join('');
}

function memoRowHtml(m, from) {
  return `
    <div class="memo-row" onclick="openMemo('${m.id}','${from}')">
      <div class="memo-row-cat">${escHtml(m.category || '기타')}</div>
      <div class="memo-row-title">${escHtml(m.title || '제목없음')} ${m.isTemp ? '<span class=\'temp-badge\'>임시</span>' : ''}</div>
      <div class="memo-row-date">${formatDate(m.updatedAt)}</div>
      <div class="memo-row-arrow">›</div>
    </div>
  `;
}

// ── LIST RENDER ────────────────────────────────────────────────
function renderList() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let filtered = memos.filter(m => {
    if (listTab === 'star') return m.starred;
    if (listTab === 'temp') return m.isTemp;
    return !m.isTemp;
  });
  if (query) {
    filtered = filtered.filter(m =>
      (m.title||'').toLowerCase().includes(query) ||
      (m.summary||'').toLowerCase().includes(query) ||
      (m.original||'').toLowerCase().includes(query)
    );
  }
  filtered.sort((a,b) => b.updatedAt - a.updatedAt);
  const body = document.getElementById('memoListBody');
  if (!body) return;
  if (filtered.length === 0) {
    body.innerHTML = '<div class="memo-empty">메모 없음</div>';
    return;
  }
  body.innerHTML = filtered.map(m => memoRowHtml(m, 'list')).join('');
}

function switchListTab(tab) {
  listTab = tab;
  ['ltabAll','ltabStar','ltabTemp'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  document.getElementById(tab === 'all' ? 'ltabAll' : tab === 'star' ? 'ltabStar' : 'ltabTemp')?.classList.add('active');
  renderList();
}

// ── DETAIL ─────────────────────────────────────────────────────
function openMemo(id, from) {
  currentMemoId = id;
  prevScreen = from || 'home';
  const memo = memos.find(m => m.id === id);
  if (!memo) return;

  document.getElementById('detailCat').textContent = '📂 ' + (memo.category || '기타');
  document.getElementById('detailTitle').textContent = memo.title || '제목없음';

  const starBtn = document.getElementById('starBtn');
  starBtn.textContent = memo.starred ? '⭐' : '☆';
  starBtn.className = 'icon-btn' + (memo.starred ? ' starred' : '');

  const keyPointsHtml = memo.keyPoints && memo.keyPoints.length > 0
    ? `<ul class="key-points">${memo.keyPoints.map(p => `<li class="key-point-item"><div class="key-point-bullet"></div><span>${escHtml(p)}</span></li>`).join('')}</ul>`
    : `<div class="original-content">${escHtml(memo.summary || '')}</div>`;

  const mergeNotice = memo.mergedFrom
    ? `<div class="merge-notice">🔗 다른 메모와 병합된 내용이 포함됨</div>` : '';

  document.getElementById('detailBody').innerHTML = `
    ${mergeNotice}
    <div class="content-block">
      <div class="block-label summary"><div class="dot"></div>AI 정리본</div>
      ${keyPointsHtml}
    </div>
    <button class="show-original-btn" id="origToggleBtn" onclick="toggleOriginal()">📄 원본 보기</button>
    <div id="originalBlock" style="display:none">
      <div class="content-block">
        <div class="block-label"><div class="dot"></div>원문</div>
        <div class="original-content">${escHtml(memo.original || '')}</div>
      </div>
    </div>
  `;

  showScreen('detail');
}

function toggleOriginal() {
  const block = document.getElementById('originalBlock');
  const btn = document.getElementById('origToggleBtn');
  if (block.style.display === 'none') {
    block.style.display = 'block';
    btn.textContent = '📄 원본 숨기기';
  } else {
    block.style.display = 'none';
    btn.textContent = '📄 원본 보기';
  }
}

async function toggleStarCurrent() {
  const m = memos.find(m => m.id === currentMemoId);
  if (!m) return;
  m.starred = !m.starred;
  m.updatedAt = Date.now();
  await updateMemo(m);
  openMemo(m.id, prevScreen);
  renderHome();
  toast(m.starred ? '⭐ 즐겨찾기 추가' : '☆ 즐겨찾기 해제', 'info');
}

async function deleteCurrentMemo() {
  if (!confirm('이 메모를 삭제할까요?')) return;
  await deleteMemoDb(currentMemoId);
  memos = memos.filter(m => m.id !== currentMemoId);
  currentMemoId = null;
  goBackFromDetail();
  renderHome();
  toast('🗑 삭제됨', 'info');
}

// ── PROCESS INPUT ──────────────────────────────────────────────
async function processInput() {
  const input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘', 'info');
  const apiKey = getApiKey();
  if (!apiKey) return toast('API 키 먼저 설정해줘', 'info');
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('processBtn').disabled = true;

  try {
    setProcessing('🔢 벡터 변환 중...');
    const embedding = await getEmbedding(input, apiKey);

    setProcessing('🔍 유사 메모 검색 중...');
    let similarMemos = [];
    if (embedding) similarMemos = await findSimilarMemos(embedding, 0.75);

    const similarContext = similarMemos.length > 0
      ? similarMemos.map(m => `ID:${m.id} | 제목:${m.title} | 유사도:${(m.similarity*100).toFixed(0)}% | 요약:${(m.summary||'').substring(0,150)}`).join('\n')
      : '(없음)';

    const prompt = `[IMPORTANT: Respond with valid JSON only. No markdown, no code blocks, no extra text. Just raw JSON.]

너는 메모 정리 전문가야. 아래 입력된 메모를 분석해서 JSON으로만 응답해.

정리 원칙:
- 내용을 이해할 수 있을 만큼 충분히 써줘 (너무 짧게 자르지 마)
- 중복된 말, 군더더기 표현만 제거
- 핵심 정보, 수치, 이름, 날짜는 반드시 보존
- keyPoints는 각 항목을 읽으면 내용을 파악할 수 있을 정도로 구체적으로

벡터 검색으로 찾은 유사 메모 (유사도 75% 이상):
${similarContext}

새 입력:
${input}

유사 메모가 있고 같은 주제면 decision을 merge로, 없거나 완전히 다른 주제면 new로 설정.
반드시 아래 JSON만 출력 (마크다운 절대 금지):
{"title":"핵심 제목 20자이내","category":"아이디어/계획/인물/프로젝트/일상/기타 중 하나","summary":"내용을 충분히 파악할 수 있도록 핵심 내용을 5-8문장으로 정리. 중요한 세부사항 포함.","keyPoints":["구체적인 핵심 포인트1","구체적인 핵심 포인트2","구체적인 핵심 포인트3","구체적인 핵심 포인트4"],"similarMemoId":"유사메모ID 또는 null","similarMemoTitle":"유사메모제목 또는 null","decision":"new 또는 merge","decisionReason":"판단이유 1문장"}`;

    setProcessing('🤖 AI 정리 중...');
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 2000 } })
      }
    );
    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || 'API 오류'); }

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI 응답 파싱 실패. 다시 시도해줘.');
    let result;
    try { result = JSON.parse(jsonMatch[0]); }
    catch { const fixed = jsonMatch[0].replace(/,\s*([}\]])/, '$1'); result = JSON.parse(fixed); }

    setProcessing('💾 저장 중...');

    if (result.decision === 'merge' && result.similarMemoId) {
      const existing = memos.find(m => m.id === result.similarMemoId);
      if (existing) { stopProcessing(); showMergeDecision(input, result, existing); return; }
    }

    const newMemo = {
      id: genId(), title: result.title, category: result.category,
      summary: result.summary, keyPoints: result.keyPoints,
      original: input, isTemp: result.decision === 'temp',
      starred: false, createdAt: Date.now(), updatedAt: Date.now()
    };
    await saveMemo(newMemo, embedding);
    memos.unshift(newMemo);
    stopProcessing();
    document.getElementById('memoInput').value = '';
    updateCharCount();
    renderHome();
    openMemo(newMemo.id, 'home');
    toast(result.decision === 'temp' ? '📥 임시보관함에 저장됨' : `✅ 메모 저장됨 — "${result.title}"`, 'success');

  } catch (e) {
    console.error(e);
    stopProcessing();
    toast('오류: ' + e.message);
  } finally {
    isProcessing = false;
    document.getElementById('processBtn').disabled = false;
  }
}

function showMergeDecision(input, result, existingMemo) {
  const body = document.getElementById('mergeBody');
  body.innerHTML = `
    <div style="padding:4px 0 16px; font-size:13px; color:var(--text3);">${escHtml(result.decisionReason)}</div>
    <div class="content-block" style="border-color:rgba(124,92,252,0.3);background:rgba(124,92,252,0.05)">
      <div class="block-label" style="color:#a58af8"><div class="dot"></div>기존 메모 — ${escHtml(existingMemo.title)}</div>
      <div class="original-content">${escHtml(existingMemo.summary || '')}</div>
    </div>
    <div class="content-block">
      <div class="block-label summary"><div class="dot"></div>새로 추가될 내용</div>
      <div class="original-content">${escHtml(result.summary)}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
      <button class="btn btn-primary" onclick="doMerge('${existingMemo.id}', ${JSON.stringify(JSON.stringify(input))}, ${JSON.stringify(JSON.stringify(result))})">🔗 기존 메모에 합치기</button>
      <button class="btn btn-secondary" onclick="saveAsNew(${JSON.stringify(JSON.stringify(input))}, ${JSON.stringify(JSON.stringify(result))})">✨ 새 메모로 저장</button>
      <button class="btn btn-ghost" onclick="saveTemp(${JSON.stringify(JSON.stringify(input))}, ${JSON.stringify(JSON.stringify(result))})">📥 임시보관</button>
    </div>
  `;
  showScreen('merge');
}

async function doMerge(existingId, rawInputStr, resultStr) {
  const rawInput = JSON.parse(rawInputStr);
  const result = JSON.parse(resultStr);
  const existing = memos.find(m => m.id === existingId);
  if (!existing) return;
  const apiKey = getApiKey();
  setProcessing('🔄 병합 중...');
  try {
    const mergePrompt = `[IMPORTANT: Respond with valid JSON only. Just raw JSON.]
기존 메모와 새 내용을 하나로 합쳐서 정리해줘.
기존: ${existing.summary}
새 내용: ${result.summary}
{"summary":"합쳐진 요약 5-7문장","keyPoints":["통합 핵심1","통합 핵심2","통합 핵심3","통합 핵심4"]}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`,
      { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:mergePrompt}]}], generationConfig:{maxOutputTokens:1000} }) }
    );
    if (res.ok) {
      const data = await res.json();
      const raw = data.candidates?.[0]?.content?.parts?.map(p => p.text||'').join('') || '';
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) { try { const merged = JSON.parse(match[0]); existing.summary = merged.summary; existing.keyPoints = merged.keyPoints; } catch{} }
    }
    existing.original = (existing.original||'') + '\n\n---\n\n' + rawInput;
    existing.mergedFrom = existing.title;
    existing.updatedAt = Date.now();
    let emb = null;
    try { emb = await getEmbedding(existing.summary + ' ' + existing.original.substring(0,1000), apiKey); } catch{}
    await updateMemo(existing, emb);
    stopProcessing();
    document.getElementById('memoInput').value = '';
    updateCharCount();
    renderHome();
    openMemo(existing.id, 'home');
    toast(`✅ "${existing.title}"에 병합됨`, 'success');
  } catch(e) { stopProcessing(); toast('병합 오류: ' + e.message); }
}

async function saveAsNew(rawInputStr, resultStr) {
  const rawInput = JSON.parse(rawInputStr);
  const result = JSON.parse(resultStr);
  const memo = { id:genId(), title:result.title, category:result.category, summary:result.summary, keyPoints:result.keyPoints, original:rawInput, isTemp:false, starred:false, createdAt:Date.now(), updatedAt:Date.now() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  updateCharCount();
  renderHome();
  openMemo(memo.id, 'home');
  toast(`✅ 새 메모로 저장됨 — "${memo.title}"`, 'success');
}

async function saveTemp(rawInputStr, resultStr) {
  const rawInput = JSON.parse(rawInputStr);
  const result = JSON.parse(resultStr);
  const memo = { id:genId(), title:result.title, category:result.category, summary:result.summary, keyPoints:result.keyPoints, original:rawInput, isTemp:true, starred:false, createdAt:Date.now(), updatedAt:Date.now() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  renderHome();
  toast('📥 임시보관함에 저장됨', 'info');
  showScreen('home');
}

async function saveDirect() {
  const input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘', 'info');
  const memo = { id:genId(), title:input.substring(0,20)+(input.length>20?'...':''), category:'임시', summary:input, keyPoints:[], original:input, isTemp:true, starred:false, createdAt:Date.now(), updatedAt:Date.now() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  updateCharCount();
  renderHome();
  toast('📥 임시보관함에 저장됨', 'info');
  showScreen('home');
}

async function promoteTemp(id) {
  const m = memos.find(m => m.id === id);
  if (!m) return;
  m.isTemp = false; m.updatedAt = Date.now();
  await updateMemo(m);
  openMemo(m.id, prevScreen);
  toast('✅ 정식 메모로 저장됨', 'success');
}

// ── UI HELPERS ─────────────────────────────────────────────────
function setProcessing(text) {
  document.getElementById('processingStep').textContent = text;
  document.getElementById('processingOverlay').classList.add('open');
}
function stopProcessing() {
  document.getElementById('processingOverlay').classList.remove('open');
}
function updateCharCount() {
  const len = document.getElementById('memoInput')?.value.length || 0;
  const el = document.getElementById('charCount');
  if (el) el.textContent = `${len.toLocaleString()}자`;
}
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function genId() { return 'memo_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000) return '방금';
  if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Ctrl+Enter
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') processInput();
});

// Init saved API key
const savedKey = localStorage.getItem('memox_gemini_key');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
  onApiKeyInput(savedKey);
}

// INIT
loadMemos();
</script>
