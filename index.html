<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MEMOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --surface3:#222;
    --border:#2a2a2a; --accent:#c8f565; --accent2:#7c5cfc;
    --text:#f0f0f0; --text2:#aaa; --text3:#666;
    --danger:#ff4444; --warn:#f5a623;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }

  /* HEADER */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; border-bottom:1px solid var(--border);
    background:var(--bg); flex-shrink:0;
  }
  .logo { font-family:'Gmarket Sans',sans-serif; font-weight:700; font-size:19px; color:var(--accent); }
  .logo span { color:var(--text); }
  .header-right { display:flex; align-items:center; gap:8px; }
  .api-pill {
    display:flex; align-items:center; gap:5px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:5px 11px; cursor:pointer; font-size:11px; color:var(--text3);
  }
  .api-pill.connected { border-color:rgba(200,245,101,0.3); color:var(--accent); }
  .api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); }
  .api-dot.on { background:var(--accent); }
  .all-memos-btn {
    background:var(--surface2); color:var(--text2); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px; font-size:11px; font-weight:700;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .all-memos-btn:hover { background:var(--surface3); color:var(--text); }

  /* API KEY MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:500; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:24px; width:100%; max-width:400px;
  }
  .modal-title { font-family:'Gmarket Sans',sans-serif; font-size:18px; margin-bottom:6px; }
  .modal-sub { font-size:12px; color:var(--text3); margin-bottom:14px; line-height:1.8; }
  .modal input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px; color:var(--text); font-size:13px;
    font-family:monospace; outline:none; margin-bottom:12px;
  }
  .modal input:focus { border-color:var(--accent); }

  /* SCREENS */
  .screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
  .screen.active { display:flex; }

  /* HOME SCREEN */
  .home-top {
    display:grid; grid-template-columns:1fr 1fr;
    flex:1; overflow:hidden; border-bottom:1px solid var(--border);
  }
  .home-panel {
    display:flex; flex-direction:column; overflow:hidden;
    border-right:1px solid var(--border);
  }
  .home-panel:last-child { border-right:none; }
  .panel-header {
    padding:12px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .panel-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text2); }
  .panel-body { flex:1; overflow-y:auto; padding:10px; }
  .panel-body::-webkit-scrollbar { width:3px; }
  .panel-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* TODO */
  .todo-input-row { display:flex; gap:6px; margin-bottom:8px; }
  .todo-input-row input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:7px; padding:7px 10px; color:var(--text); font-size:12px;
    font-family:'Noto Sans KR',sans-serif; outline:none; min-width:0;
  }
  .todo-input-row input:focus { border-color:var(--accent); }
  .todo-add-btn {
    background:var(--accent); color:#0a0a0a; border:none; border-radius:7px;
    width:30px; height:30px; font-size:16px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  .todo-item {
    display:flex; align-items:center; gap:8px; padding:8px 6px; border-radius:7px;
    cursor:pointer; transition:background 0.15s; margin-bottom:3px;
  }
  .todo-item:hover { background:var(--surface2); }
  .todo-check {
    width:16px; height:16px; border-radius:50%; border:2px solid var(--border);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .todo-item.done .todo-check { background:var(--accent); border-color:var(--accent); }
  .todo-item.done .todo-check::after { content:'✓'; font-size:9px; color:#0a0a0a; font-weight:700; }
  .todo-text { flex:1; font-size:12px; color:var(--text); font-weight:500; line-height:1.4; }
  .todo-item.done .todo-text { text-decoration:line-through; color:var(--text3); }
  .todo-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:12px; padding:2px; opacity:0; transition:opacity 0.15s; }
  .todo-item:hover .todo-del { opacity:1; }
  .panel-empty { text-align:center; padding:24px 10px; color:var(--text3); font-size:11px; line-height:2; }

  /* MEMO ROWS */
  .memo-row {
    display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:8px;
    cursor:pointer; border:1px solid var(--border); margin-bottom:5px;
    background:var(--surface); transition:all 0.15s;
  }
  .memo-row:hover { border-color:var(--accent2); background:var(--surface2); }
  .memo-row-cat { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--accent); white-space:nowrap; min-width:36px; }
  .memo-row-title { flex:1; font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .memo-row-date { font-size:10px; color:var(--text3); white-space:nowrap; }
  .memo-row-arrow { color:var(--text3); font-size:11px; }

  /* INPUT AREA (홈 하단) */
  .home-input {
    padding:12px 16px 14px; background:var(--surface);
    border-top:1px solid var(--border); flex-shrink:0;
  }
  textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text); font-size:13px;
    font-family:'Noto Sans KR',sans-serif; line-height:1.6; resize:none; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s; display:block;
  }
  textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,245,101,0.07); }
  textarea::placeholder { color:var(--text3); }
  .input-actions { display:flex; gap:8px; margin-top:10px; align-items:center; flex-wrap:wrap; }
  .char-count { font-size:11px; color:var(--text3); margin-left:auto; }

  /* LIST SCREEN */
  .screen-header {
    padding:13px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .back-btn { background:none; border:none; cursor:pointer; color:var(--text2); font-size:20px; padding:0; }
  .screen-title { font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; }
  .search-wrap { padding:10px 14px; border-bottom:1px solid var(--border); position:relative; flex-shrink:0; }
  .search-wrap input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px 7px 30px; color:var(--text); font-size:13px;
    font-family:'Noto Sans KR',sans-serif; outline:none;
  }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap .si { position:absolute; left:24px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text3); }
  .list-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .list-tab { flex:1; padding:9px; text-align:center; font-size:11px; font-weight:700; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
  .list-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .list-body { flex:1; overflow-y:auto; padding:10px 12px; }
  .list-body::-webkit-scrollbar { width:3px; }
  .list-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* DETAIL SCREEN */
  .detail-header {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .detail-header-meta { flex:1; min-width:0; }
  .detail-actions { display:flex; gap:6px; }
  .icon-btn {
    width:32px; height:32px; border-radius:7px; border:1px solid var(--border);
    background:var(--surface2); cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:var(--text2); font-size:14px; transition:all 0.15s;
  }
  .icon-btn:hover { background:var(--surface3); color:var(--text); }
  .icon-btn.starred { color:var(--warn); border-color:rgba(245,166,35,0.3); }
  .icon-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
  .detail-cat { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
  .detail-title { font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; line-height:1.3; }
  .detail-body { flex:1; overflow-y:auto; padding:16px; }
  .detail-body::-webkit-scrollbar { width:3px; }
  .detail-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* CONTENT BLOCKS */
  .content-block { background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:16px; margin-bottom:12px; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .block-label { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .block-label .dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .block-label.summary { color:var(--accent); }
  .key-points { list-style:none; display:flex; flex-direction:column; gap:7px; }
  .key-point-item { display:flex; align-items:flex-start; gap:9px; font-size:13px; color:var(--text); line-height:1.6; }
  .key-point-bullet { width:5px; height:5px; border-radius:50%; background:var(--accent); margin-top:8px; flex-shrink:0; }
  .original-content { font-size:13px; line-height:1.85; color:var(--text2); white-space:pre-wrap; }
  .show-original-btn {
    width:100%; padding:11px; background:var(--surface2); border:1px solid var(--border);
    border-radius:9px; color:var(--text3); font-size:12px; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; margin-bottom:12px; transition:all 0.15s;
  }
  .show-original-btn:hover { border-color:var(--text3); color:var(--text2); }
  .merge-notice { background:rgba(124,92,252,0.1); border:1px solid rgba(124,92,252,0.25); border-radius:9px; padding:10px 12px; margin-bottom:12px; font-size:12px; color:#a58af8; display:flex; align-items:center; gap:7px; }

  /* MERGE SCREEN */
  .merge-body { flex:1; overflow-y:auto; padding:16px; }

  /* PROCESSING */
  .processing-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:400; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
  .processing-overlay.open { display:flex; }
  .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .processing-step { font-size:12px; color:var(--accent); font-weight:700; letter-spacing:1px; }

  /* BUTTONS */
  .btn { padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:700; transition:all 0.15s; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#0a0a0a; }
  .btn-primary:hover:not(:disabled) { background:#d4ff7a; }
  .btn-secondary { background:var(--surface3); color:var(--text2); border:1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { color:var(--text); }
  .btn-ghost { background:transparent; color:var(--text3); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { color:var(--text); border-color:var(--text3); }

  /* SAVE SUCCESS CARD */
  .save-success {
    display:none; position:fixed; inset:0; z-index:600;
    align-items:center; justify-content:center; padding:24px;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
  }
  .save-success.open { display:flex; }
  .save-card {
    background:linear-gradient(135deg, #0f1f0a 0%, #0a0a0a 40%, #0d0a1f 100%);
    border:1px solid rgba(200,245,101,0.25);
    border-radius:20px; padding:32px 28px; width:100%; max-width:360px;
    text-align:center; position:relative; overflow:hidden;
    box-shadow:0 0 60px rgba(200,245,101,0.1), 0 24px 48px rgba(0,0,0,0.6);
    animation:cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardPop { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  .save-card-glow {
    position:absolute; top:-40px; left:50%; transform:translateX(-50%);
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, rgba(200,245,101,0.15) 0%, transparent 70%);
    pointer-events:none;
  }
  .save-card-icon { font-size:48px; margin-bottom:12px; display:block; }
  .save-card-title {
    font-family:'Gmarket Sans',sans-serif; font-size:22px; font-weight:700;
    color:var(--accent); margin-bottom:6px; letter-spacing:-0.5px;
  }
  .save-card-memo {
    font-size:15px; color:var(--text); font-weight:500; margin-bottom:4px;
    line-height:1.4;
  }
  .save-card-cat {
    font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color:var(--accent2); margin-bottom:20px;
  }
  .save-card-points {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    border-radius:10px; padding:14px; margin-bottom:20px; text-align:left;
    display:flex; flex-direction:column; gap:7px;
  }
  .save-card-point {
    display:flex; align-items:flex-start; gap:8px;
    font-size:12px; color:rgba(240,240,240,0.8); line-height:1.5;
  }
  .save-card-point-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); margin-top:5px; flex-shrink:0; }
  .save-card-actions { display:flex; gap:8px; }
  .save-card-actions .btn { flex:1; justify-content:center; }

  /* TOAST */
  .toast-container { position:fixed; bottom:16px; right:16px; display:flex; flex-direction:column; gap:6px; z-index:999; }
  .toast { background:var(--surface3); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:9px; font-size:12px; animation:slideIn 0.3s ease; box-shadow:0 6px 20px rgba(0,0,0,0.4); }
  .toast.success { border-color:rgba(200,245,101,0.3); }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

  /* TEMP BADGE */
  .temp-badge { background:rgba(245,166,35,0.1); border:1px solid rgba(245,166,35,0.2); color:var(--warn); font-size:9px; font-weight:700; padding:1px 5px; border-radius:20px; }

  /* MOBILE */
  @media (max-width:600px) {
    .home-top { grid-template-columns:1fr 1fr; min-height:0; }
    .home-panel { border-right:1px solid var(--border); min-height:0; }
    .home-panel:last-child { border-right:none; }
    .home-input { padding:10px 12px 12px; flex-shrink:0; }
    textarea { font-size:14px; min-height:56px; max-height:90px; }
    .input-actions { gap:6px; margin-top:8px; }
    .btn { padding:8px 12px; font-size:12px; }
    .char-count { display:none; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">MEMO<span>X</span></div>
  <div class="header-right">
    <div class="api-pill" id="apiPill" onclick="document.getElementById('apiModal').classList.add('open')">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiStatus">API 키 설정</span>
    </div>
    <button class="all-memos-btn" onclick="showScreen('list')">📋 전체 메모</button>
    <div id="userAvatar" style="display:none;align-items:center;gap:6px;cursor:pointer;" onclick="confirmLogout()">
      <img id="userAvatarImg" src="" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);" />
    </div>
  </div>
</header>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <div class="modal-title">🔑 Gemini API 키</div>
    <div class="modal-sub">aistudio.google.com → Get API key → Create API key<br>무료로 발급 가능해!</div>
    <input type="password" id="apiKeyInput" placeholder="AIza..." oninput="onApiKeyInput(this.value)" />
    <button class="btn btn-primary" onclick="document.getElementById('apiModal').classList.remove('open')">확인</button>
  </div>
</div>

<!-- PROCESSING OVERLAY -->
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-step" id="processingStep">처리 중...</div>
</div>

<!-- SCREEN: HOME -->
<!-- SCREEN: LOGIN -->
<div class="screen active" id="screenLogin" style="align-items:center;justify-content:center;background:var(--bg);">
  <div style="text-align:center;padding:40px 24px;max-width:340px;width:100%;">
    <div style="font-family:'Gmarket Sans',sans-serif;font-size:42px;font-weight:700;color:var(--accent);margin-bottom:4px;">MEMO<span style="color:var(--text);">X</span></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:48px;line-height:2;">붙여넣으면 AI가 알아서 정리해주는<br>나만의 메모앱</div>
    <button onclick="loginWithGoogle()" style="
      width:100%;padding:15px;border-radius:12px;border:1px solid var(--border);
      background:var(--surface2);color:var(--text);font-size:14px;font-weight:700;
      cursor:pointer;font-family:'Noto Sans KR',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all 0.2s;
    " onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 시작하기
    </button>
    <div style="font-size:11px;color:var(--text3);margin-top:20px;line-height:1.8;">로그인하면 어떤 기기에서든<br>내 메모에 접근할 수 있어</div>
  </div>
</div>

<!-- SCREEN: HOME -->
<div class="screen" id="screenHome">
  <!-- 상단: 할일 + 즐겨찾기 -->
  <div class="home-top">
    <div class="home-panel">
      <div class="panel-header">
        <div class="panel-title">📋 할일</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:var(--text3)" id="todoCount"></span>
          <button onclick="clearDoneTodos()" style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--text3);padding:0;" title="완료 항목 삭제">완료삭제</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="todo-input-row">

<!-- SAVE SUCCESS OVERLAY -->
<div class="save-success" id="saveSuccess" onclick="closeSaveSuccess()">
  <div class="save-card" onclick="event.stopPropagation()">
    <div class="save-card-glow"></div>
    <span class="save-card-icon">✦</span>
    <div class="save-card-title">저장 완료</div>
    <div class="save-card-memo" id="saveCardTitle"></div>
    <div class="save-card-cat" id="saveCardCat"></div>
    <div class="save-card-points" id="saveCardPoints"></div>

      <button class="btn btn-ghost" onclick="closeSaveSuccess()">닫기</button>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let memos = [];
let todos = JSON.parse(localStorage.getItem('memox_todos') || '[]');
let currentMemoId = null;
let listTab = 'all';
let prevScreen = 'home';
let isProcessing = false;

// ── AUTH ──────────────────────────────────────────────────────
async function loginWithGoogle() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://kkdmb7-blip.github.io/memox' }
  });
}

async function confirmLogout() {
  if (!confirm('로그아웃 할까요?')) return;
  await supabase.auth.signOut();
  currentUser = null; memos = [];
  showScreen('login');
  document.getElementById('userAvatar').style.display = 'none';
}

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session && session.user) { setUser(session.user); }
  else { showScreen('login'); }
  supabase.auth.onAuthStateChange(function(_event, session) {
    if (session && session.user) { setUser(session.user); }
    else { showScreen('login'); }
  });
}

function setUser(user) {
  currentUser = user;
  var avatar = document.getElementById('userAvatar');
  var avatarImg = document.getElementById('userAvatarImg');
  if (user.user_metadata && user.user_metadata.avatar_url) {
    avatarImg.src = user.user_metadata.avatar_url;
    avatar.style.display = 'flex';
  }
  loadMemos();
  showScreen('home');
}

// ── DB ────────────────────────────────────────────────────────
function fromDb(r) {
  return {
    id: r.id, title: r.title, category: r.category, summary: r.summary,
    keyPoints: r.key_points || [], original: r.original,
    isTemp: r.is_temp, starred: r.starred, mergedFrom: r.merged_from,
    createdAt: r.created_at, updatedAt: r.updated_at
  };
}

function toDb(m) {
  return {
    id: m.id, title: m.title, category: m.category, summary: m.summary,
    key_points: m.keyPoints || [], original: m.original,
    is_temp: m.isTemp, starred: m.starred, merged_from: m.mergedFrom || null,
    created_at: m.createdAt, updated_at: m.updatedAt,
    user_id: currentUser ? currentUser.id : null
  };
}

async function loadMemos() {
  if (!currentUser) return;
  try {
    var res = await supabase.from('memos').select('*').eq('user_id', currentUser.id).order('updated_at', { ascending: false });
    if (res.error) throw res.error;
    memos = (res.data || []).map(fromDb);
    renderHome();
  } catch(e) { toast('메모 불러오기 실패: ' + e.message); }
}

async function saveMemo(memo, embedding) {
  var data = toDb(memo);
  if (embedding) data.embedding = JSON.stringify(embedding);
  var res = await supabase.from('memos').insert(data);
  if (res.error) throw new Error(res.error.message);
}

async function updateMemo(memo, embedding) {
  var data = toDb(memo);
  if (embedding) data.embedding = JSON.stringify(embedding);
  var res = await supabase.from('memos').update(data).eq('id', memo.id).eq('user_id', currentUser.id);
  if (res.error) throw new Error(res.error.message);
}

async function deleteMemoDb(id) {
  var res = await supabase.from('memos').delete().eq('id', id).eq('user_id', currentUser.id);
  if (res.error) throw new Error(res.error.message);
}

// ── EMBEDDING ─────────────────────────────────────────────────
async function getEmbedding(text, apiKey) {
  var res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent?key=' + apiKey,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'models/text-embedding-004', content: { parts: [{ text: text.substring(0, 2000) }] } })
    }
  );
  if (!res.ok) throw new Error('임베딩 오류: ' + res.status);
  var data = await res.json();
  return data.embedding ? data.embedding.values : null;
}

async function findSimilarMemos(embedding) {
  try {
    var res = await supabase.rpc('match_memos', {
      query_embedding: embedding,
      match_threshold: 0.75,
      match_count: 3,
      user_id_filter: currentUser.id
    });
    if (res.error) return [];
    return res.data || [];
  } catch(e) { return []; }
}

// ── SCREENS ───────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var id = 'screen' + name.charAt(0).toUpperCase() + name.slice(1);
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'list') renderList();
}

function goBackFromDetail() {
  showScreen(prevScreen === 'list' ? 'list' : 'home');
}

// ── API KEY ───────────────────────────────────────────────────
function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem('memox_gemini_key') || '';
}

function onApiKeyInput(val) {
  var dot = document.getElementById('apiDot');
  var status = document.getElementById('apiStatus');
  var pill = document.getElementById('apiPill');
  if (val.length > 10) {
    dot.classList.add('on'); status.textContent = '연결됨'; pill.classList.add('connected');
    localStorage.setItem('memox_gemini_key', val);
  } else {
    dot.classList.remove('on'); status.textContent = 'API 키 설정'; pill.classList.remove('connected');
    localStorage.removeItem('memox_gemini_key');
  }
}

// ── TODO ──────────────────────────────────────────────────────
function saveTodos() { localStorage.setItem('memox_todos', JSON.stringify(todos)); }

function addTodo() {
  var input = document.getElementById('todoInput');
  var text = input.value.trim();
  if (!text) return;
  todos.unshift({ id: genId(), text: text, done: false });
  input.value = '';
  saveTodos(); renderTodos();
}

function toggleTodo(id) {
  var t = todos.find(function(t) { return t.id === id; });
  if (t) { t.done = !t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id) {
  todos = todos.filter(function(t) { return t.id !== id; });
  saveTodos(); renderTodos();
}

function clearDoneTodos() {
  var doneCount = todos.filter(function(t) { return t.done; }).length;
  if (doneCount === 0) return toast('완료된 항목이 없어');
  todos = todos.filter(function(t) { return !t.done; });
  saveTodos(); renderTodos();
  toast('완료 항목 ' + doneCount + '개 삭제됨');
}

function renderTodos() {
  var list = document.getElementById('todoList');
  var count = document.getElementById('todoCount');
  var remaining = todos.filter(function(t) { return !t.done; }).length;
  var done = todos.filter(function(t) { return t.done; }).length;
  if (count) count.textContent = remaining > 0 ? remaining + '개' : (done > 0 ? '모두완료!' : '');
  if (todos.length === 0) {
    list.innerHTML = '<div class="panel-empty">할일을 추가해봐</div>';
    return;
  }
  var sorted = todos.filter(function(t){return !t.done;}).concat(todos.filter(function(t){return t.done;}));
  list.innerHTML = sorted.map(function(t) {
    return '<div class="todo-item ' + (t.done ? 'done' : '') + '" onclick="toggleTodo(\'' + t.id + '\')">'
      + '<div class="todo-check"></div>'
      + '<div class="todo-text">' + escHtml(t.text) + '</div>'
      + '<button class="todo-del" onclick="event.stopPropagation();deleteTodo(\'' + t.id + '\')">✕</button>'
      + '</div>';
  }).join('');
}

// ── HOME ──────────────────────────────────────────────────────
function renderHome() {
  renderTodos();
  var starred = memos.filter(function(m) { return m.starred && !m.isTemp; });
  var list = document.getElementById('starredList');
  if (!list) return;
  if (starred.length === 0) {
    list.innerHTML = '<div class="panel-empty">즐겨찾기한 메모가 없어<br>메모에서 ☆ 눌러봐</div>';
    return;
  }
  list.innerHTML = starred.map(function(m) { return memoRowHtml(m, 'home'); }).join('');
}

function memoRowHtml(m, from) {
  return '<div class="memo-row" onclick="openMemo(\'' + m.id + '\',\'' + from + '\')">'
    + '<div class="memo-row-cat">' + escHtml(m.category || '기타') + '</div>'
    + '<div class="memo-row-title">' + escHtml(m.title || '제목없음') + (m.isTemp ? ' <span class="temp-badge">임시</span>' : '') + '</div>'
    + '<div class="memo-row-date">' + formatDate(m.updatedAt) + '</div>'
    + '<div class="memo-row-arrow">›</div>'
    + '</div>';
}

// ── LIST ──────────────────────────────────────────────────────
function renderList() {
  var query = (document.getElementById('searchInput') ? document.getElementById('searchInput').value : '').toLowerCase();
  var filtered = memos.filter(function(m) {
    if (listTab === 'star') return m.starred;
    if (listTab === 'temp') return m.isTemp;
    return !m.isTemp;
  });
  if (query) {
    filtered = filtered.filter(function(m) {
      return (m.title||'').toLowerCase().includes(query)
        || (m.summary||'').toLowerCase().includes(query)
        || (m.original||'').toLowerCase().includes(query);
    });
  }
  filtered.sort(function(a,b) { return new Date(b.updatedAt) - new Date(a.updatedAt); });
  var body = document.getElementById('memoListBody');
  if (!body) return;
  if (filtered.length === 0) {
    body.innerHTML = '<div class="panel-empty" style="padding:32px">메모 없음</div>';
    return;
  }
  body.innerHTML = filtered.map(function(m) { return memoRowHtml(m, 'list'); }).join('');
}

function switchListTab(tab) {
  listTab = tab;
  ['ltabAll','ltabStar','ltabTemp'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  var activeId = tab === 'all' ? 'ltabAll' : tab === 'star' ? 'ltabStar' : 'ltabTemp';
  var activeEl = document.getElementById(activeId);
  if (activeEl) activeEl.classList.add('active');
  renderList();
}

// ── DETAIL ────────────────────────────────────────────────────
function openMemo(id, from) {
  currentMemoId = id;
  prevScreen = from || 'home';
  var memo = memos.find(function(m) { return m.id === id; });
  if (!memo) return;
  document.getElementById('detailCat').textContent = '📂 ' + (memo.category || '기타');
  document.getElementById('detailTitle').textContent = memo.title || '제목없음';
  document.getElementById('detailTitle').style.display = '';
  document.getElementById('detailTitleInput').style.display = 'none';
  var starBtn = document.getElementById('starBtn');
  starBtn.textContent = memo.starred ? '⭐' : '☆';
  starBtn.className = 'icon-btn' + (memo.starred ? ' starred' : '');

  var kpHtml = '';
  if (memo.keyPoints && memo.keyPoints.length > 0) {
    kpHtml = '<ul class="key-points">' + memo.keyPoints.map(function(p) {
      return '<li class="key-point-item"><div class="key-point-bullet"></div><span>' + escHtml(p) + '</span></li>';
    }).join('') + '</ul>';
  } else {
    kpHtml = '<div class="original-content">' + escHtml(memo.summary || '') + '</div>';
  }

  var mergeNotice = memo.mergedFrom ? '<div class="merge-notice">🔗 다른 메모와 병합된 내용 포함</div>' : '';
  document.getElementById('detailBody').innerHTML = mergeNotice
    + '<div class="content-block"><div class="block-label summary"><div class="dot"></div>AI 정리본</div>' + kpHtml + '</div>'
    + '<button class="show-original-btn" id="origToggleBtn" onclick="toggleOriginal()">📄 원본 보기</button>'
    + '<div id="originalBlock" style="display:none"><div class="content-block"><div class="block-label"><div class="dot"></div>원문</div>'
    + '<div class="original-content">' + escHtml(memo.original || '') + '</div></div></div>';

  showScreen('detail');
}

function toggleOriginal() {
  var block = document.getElementById('originalBlock');
  var btn = document.getElementById('origToggleBtn');
  if (block.style.display === 'none') { block.style.display = 'block'; btn.textContent = '📄 원본 숨기기'; }
  else { block.style.display = 'none'; btn.textContent = '📄 원본 보기'; }
}

async function toggleStarCurrent() {
  var m = memos.find(function(m) { return m.id === currentMemoId; });
  if (!m) return;
  m.starred = !m.starred; m.updatedAt = new Date().toISOString();
  await updateMemo(m);
  openMemo(m.id, prevScreen); renderHome();
  toast(m.starred ? '⭐ 즐겨찾기 추가' : '☆ 즐겨찾기 해제');
}

async function deleteCurrentMemo() {
  if (!confirm('이 메모를 삭제할까요?')) return;
  await deleteMemoDb(currentMemoId);
  memos = memos.filter(function(m) { return m.id !== currentMemoId; });
  currentMemoId = null;
  goBackFromDetail(); renderHome();
  toast('삭제됨');
}

// ── TITLE EDIT ────────────────────────────────────────────────
function startTitleEdit() {
  var titleEl = document.getElementById('detailTitle');
  var inputEl = document.getElementById('detailTitleInput');
  inputEl.value = titleEl.textContent;
  titleEl.style.display = 'none';
  inputEl.style.display = 'block';
  inputEl.focus(); inputEl.select();
}

function cancelTitleEdit() {
  document.getElementById('detailTitle').style.display = '';
  document.getElementById('detailTitleInput').style.display = 'none';
}

async function saveTitleEdit() {
  var inputEl = document.getElementById('detailTitleInput');
  var newTitle = inputEl.value.trim();
  if (!newTitle) return cancelTitleEdit();
  var m = memos.find(function(m) { return m.id === currentMemoId; });
  if (!m) return cancelTitleEdit();
  m.title = newTitle; m.updatedAt = new Date().toISOString();
  await updateMemo(m);
  document.getElementById('detailTitle').textContent = newTitle;
  cancelTitleEdit(); renderHome();
  toast('제목 수정됨');
}

// ── PROCESS INPUT ─────────────────────────────────────────────
async function processInput() {
  var input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘');
  var apiKey = getApiKey();
  if (!apiKey) return toast('API 키 먼저 설정해줘');
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('processBtn').disabled = true;

  try {
    setProcessing('🔢 벡터 변환 중...');
    var embedding = await getEmbedding(input, apiKey);

    setProcessing('🔍 유사 메모 검색 중...');
    var similarMemos = embedding ? await findSimilarMemos(embedding) : [];

    var similarContext = similarMemos.length > 0
      ? similarMemos.map(function(m) {
          return 'ID:' + m.id + ' title:' + m.title + ' similarity:' + (m.similarity*100).toFixed(0) + '% summary:' + (m.summary||'').substring(0,100);
        }).join('\n')
      : 'none';

    var promptParts = [
      'Respond with valid JSON only. No markdown. Just raw JSON object.',
      'You are a Korean memo organizer. Analyze this input and respond with JSON.',
      'Preserve all key info, numbers, names, dates. Write keyPoints specifically in Korean.',
      'Similar existing memos (similarity >= 75%): ' + similarContext,
      'New input: ' + input,
      'If similar memo exists on same topic set decision=merge, otherwise decision=new.',
      'Response format: {"title":"Korean title max 20 chars","category":"one of: 아이디어/계획/인물/프로젝트/일상/기타","summary":"5-8 sentences in Korean","keyPoints":["specific point 1 in Korean","point 2","point 3","point 4"],"similarMemoId":null,"similarMemoTitle":null,"decision":"new","decisionReason":"reason in Korean"}'
    ];
    var prompt = promptParts.join('\n');

    setProcessing('🤖 AI 정리 중...');
    var response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 2000 } })
      }
    );
    if (!response.ok) {
      var errData = await response.json();
      throw new Error(errData.error ? errData.error.message : 'API 오류');
    }
    var data = await response.json();
    var rawText = data.candidates && data.candidates[0] ? data.candidates[0].content.parts.map(function(p){return p.text||'';}).join('') : '';
    var jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI 응답 파싱 실패');
    var result;
    try { result = JSON.parse(jsonMatch[0]); }
    catch(e) { var fixed = jsonMatch[0].replace(/,\s*([}\]])/g, '$1'); result = JSON.parse(fixed); }

    setProcessing('💾 저장 중...');
    if (result.decision === 'merge' && result.similarMemoId) {
      var existing = memos.find(function(m) { return m.id === result.similarMemoId; });
      if (existing) { stopProcessing(); showMergeDecision(input, result, existing); return; }
    }

    var newMemo = {
      id: genId(), title: result.title, category: result.category,
      summary: result.summary, keyPoints: result.keyPoints,
      original: input, isTemp: false, starred: false,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    };
    await saveMemo(newMemo, embedding);
    memos.unshift(newMemo);
    stopProcessing();
    document.getElementById('memoInput').value = '';
    updateCharCount(); renderHome();
    showSaveSuccess(newMemo);

  } catch(e) {
    console.error(e); stopProcessing();
    toast('오류: ' + e.message);
  } finally {
    isProcessing = false;
    document.getElementById('processBtn').disabled = false;
  }
}

function showMergeDecision(input, result, existingMemo) {
  var inputStr = JSON.stringify(input);
  var resultStr = JSON.stringify(result);
  var body = document.getElementById('mergeBody');
  body.innerHTML = '<div style="padding:4px 0 14px;font-size:13px;color:var(--text2);">' + escHtml(result.decisionReason) + '</div>'
    + '<div class="content-block" style="border-color:rgba(124,92,252,0.3);background:rgba(124,92,252,0.05)">'
    + '<div class="block-label" style="color:#a58af8"><div class="dot"></div>기존 메모 — ' + escHtml(existingMemo.title) + '</div>'
    + '<div class="original-content">' + escHtml(existingMemo.summary||'') + '</div></div>'
    + '<div class="content-block"><div class="block-label summary"><div class="dot"></div>새로 추가될 내용</div>'
    + '<div class="original-content">' + escHtml(result.summary) + '</div></div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">'
    + '<button class="btn btn-primary" onclick="doMerge(\'' + existingMemo.id + '\', this)">🔗 기존 메모에 합치기</button>'
    + '<button class="btn btn-secondary" onclick="saveAsNew(this)">✨ 새 메모로 저장</button>'
    + '<button class="btn btn-ghost" onclick="saveTemp(this)">📥 임시보관</button>'
    + '</div>';
  // Store data
  body.dataset.input = JSON.stringify(input);
  body.dataset.result = JSON.stringify(result);
  body.dataset.existingId = existingMemo.id;
  showScreen('merge');
}

async function doMerge(existingId) {
  var body = document.getElementById('mergeBody');
  var rawInput = JSON.parse(body.dataset.input);
  var result = JSON.parse(body.dataset.result);
  var existing = memos.find(function(m) { return m.id === existingId; });
  if (!existing) return;
  var apiKey = getApiKey();
  setProcessing('🔄 병합 중...');
  try {
    var mergePrompt = 'Respond with valid JSON only.\nMerge these two memos into one in Korean.\nExisting: ' + existing.summary + '\nNew: ' + result.summary + '\nFormat: {"summary":"merged 5-7 sentences in Korean","keyPoints":["pt1","pt2","pt3","pt4"]}';
    var res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
      { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:mergePrompt}]}], generationConfig:{maxOutputTokens:1000} }) }
    );
    if (res.ok) {
      var data = await res.json();
      var raw = data.candidates && data.candidates[0] ? data.candidates[0].content.parts.map(function(p){return p.text||'';}).join('') : '';
      var match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        try { var merged = JSON.parse(match[0]); existing.summary = merged.summary; existing.keyPoints = merged.keyPoints; } catch(e){}
      }
    }
    existing.original = (existing.original||'') + '\n\n---\n\n' + rawInput;
    existing.mergedFrom = existing.title;
    existing.updatedAt = new Date().toISOString();
    var emb = null;
    try { emb = await getEmbedding(existing.summary + ' ' + existing.original.substring(0,500), apiKey); } catch(e){}
    await updateMemo(existing, emb);
    stopProcessing();
    document.getElementById('memoInput').value = '';
    updateCharCount(); renderHome();
    openMemo(existing.id, 'home');
    toast(existing.title + '에 병합됨');
  } catch(e) { stopProcessing(); toast('병합 오류: ' + e.message); }
}

async function saveAsNew() {
  var body = document.getElementById('mergeBody');
  var rawInput = JSON.parse(body.dataset.input);
  var result = JSON.parse(body.dataset.result);
  var memo = { id:genId(), title:result.title, category:result.category, summary:result.summary, keyPoints:result.keyPoints, original:rawInput, isTemp:false, starred:false, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  updateCharCount(); renderHome();
  showSaveSuccess(memo);
}

async function saveTemp() {
  var body = document.getElementById('mergeBody');
  var rawInput = JSON.parse(body.dataset.input);
  var result = JSON.parse(body.dataset.result);
  var memo = { id:genId(), title:result.title, category:result.category, summary:result.summary, keyPoints:result.keyPoints, original:rawInput, isTemp:true, starred:false, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  renderHome(); showScreen('home');
  toast('임시보관함에 저장됨');
}

async function saveDirect() {
  var input = document.getElementById('memoInput').value.trim();
  if (!input) return toast('내용을 입력해줘');
  var title = input.substring(0,20) + (input.length > 20 ? '...' : '');
  var memo = { id:genId(), title:title, category:'일반', summary:input, keyPoints:[], original:input, isTemp:false, starred:false, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  await saveMemo(memo);
  memos.unshift(memo);
  document.getElementById('memoInput').value = '';
  updateCharCount(); renderHome();
  showSaveSuccess(memo);
}

// ── UI ────────────────────────────────────────────────────────
function setProcessing(text) {
  document.getElementById('processingStep').textContent = text;
  document.getElementById('processingOverlay').classList.add('open');
}
function stopProcessing() {
  document.getElementById('processingOverlay').classList.remove('open');
}

function showSaveSuccess(memo) {
  document.getElementById('saveCardTitle').textContent = memo.title || '제목없음';
  document.getElementById('saveCardCat').textContent = memo.category || '';
  var points = (memo.keyPoints && memo.keyPoints.length > 0) ? memo.keyPoints.slice(0,3) : [memo.summary ? memo.summary.substring(0,80) : '저장됨'];
  document.getElementById('saveCardPoints').innerHTML = points.map(function(p) {
    return '<div class="save-card-point"><div class="save-card-point-dot"></div><span>' + escHtml(p) + '</span></div>';
  }).join('');
  document.getElementById('saveCardViewBtn').onclick = function() { closeSaveSuccess(); openMemo(memo.id, 'home'); };
  document.getElementById('saveSuccess').classList.add('open');
}

function closeSaveSuccess() {
  document.getElementById('saveSuccess').classList.remove('open');
}

function updateCharCount() {
  var len = document.getElementById('memoInput') ? document.getElementById('memoInput').value.length : 0;
  var el = document.getElementById('charCount');
  if (el) el.textContent = len.toLocaleString() + '자';
}

function toast(msg) {
  var c = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

function genId() { return 'memo_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }

function formatDate(ts) {
  if (!ts) return '';
  var d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000) return '방금';
  if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') processInput();
});

var savedKey = localStorage.getItem('memox_gemini_key');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
  onApiKeyInput(savedKey);
}

initAuth();
</script>
